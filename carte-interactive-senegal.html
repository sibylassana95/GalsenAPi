<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Interactive du Sénégal - Données Administratives</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #00853F;
            --primary-yellow: #FDEF42;
            --primary-red: #E31B23;
            --bg-cream: #FBF8F3;
            --text-dark: #1a1a1a;
            --border-light: #E5DFD5;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Karla', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, #006B32 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .flag-strip {
            display: flex;
            height: 8px;
            margin-top: 1.5rem;
        }

        .flag-strip div {
            flex: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            border-top: 4px solid var(--primary-green);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 133, 63, 0.15);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .map-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .filter-section {
            margin-bottom: 1.5rem;
        }

        .filter-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .filter-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Karla', sans-serif;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        .map-container {
            width: 100%;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #f8f9fa, #e9ecef);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #senegalMap {
            width: 100%;
            height: 100%;
        }

        .region-path {
            fill: #d4e5d8;
            stroke: white;
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .region-path:hover {
            fill: var(--primary-yellow);
            stroke: var(--primary-green);
            stroke-width: 3;
        }

        .region-path.selected {
            fill: var(--primary-green);
            stroke: var(--primary-red);
            stroke-width: 3;
        }

        .region-label {
            font-size: 11px;
            font-weight: 600;
            fill: var(--text-dark);
            pointer-events: none;
            text-anchor: middle;
        }

        .info-panel {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px var(--shadow);
            max-height: 800px;
            overflow-y: auto;
        }

        .info-panel::-webkit-scrollbar {
            width: 8px;
        }

        .info-panel::-webkit-scrollbar-track {
            background: var(--bg-cream);
            border-radius: 10px;
        }

        .info-panel::-webkit-scrollbar-thumb {
            background: var(--primary-green);
            border-radius: 10px;
        }

        .info-header {
            border-bottom: 3px solid var(--primary-green);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .info-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-green), #00a84f);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .info-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .info-stat-item {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid var(--primary-green);
        }

        .info-stat-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 0.3rem;
        }

        .department-list {
            margin-top: 2rem;
        }

        .department-list h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-dark);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 0.5rem;
        }

        .department-item {
            background: white;
            border: 2px solid var(--border-light);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .department-item:hover {
            border-color: var(--primary-green);
            background: #f8fdf9;
            transform: translateX(5px);
        }

        .department-name {
            font-weight: 600;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }

        .department-info {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
        }

        .department-info span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .arrondissement-list {
            margin-top: 1.5rem;
            padding-left: 1rem;
        }

        .arrondissement-item {
            padding: 0.6rem;
            background: #f8f9fa;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            border-left: 3px solid var(--primary-yellow);
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-family: 'Montserrat', sans-serif;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .back-button {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            font-family: 'Karla', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #006B32;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 133, 63, 0.3);
        }

        .legend {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            font-size: 0.85rem;
        }

        .legend-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .search-box {
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Karla', sans-serif;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #666;
            font-size: 0.9rem;
            margin-top: 3rem;
            border-top: 1px solid var(--border-light);
        }
    </style>
</head>

        let selectedRegion = null;
        let selectedDepartment = null;

        // Format numbers
        const formatNumber = (num) => num.toLocaleString('fr-FR');

        // Populate region filter
        const regionFilter = document.getElementById('regionFilter');
        regions.forEach(region => {
            const option = document.createElement('option');
            option.value = region.nom;
            option.textContent = region.nom;
            regionFilter.appendChild(option);
        });

        // Add click handlers to region paths
        document.querySelectorAll('.region-path').forEach(path => {
            path.addEventListener('click', function() {
                const regionName = this.id.replace('region-', '');
                const region = regions.find(r => r.nom === regionName);
                if (region) {
                    selectRegion(region);
                }
            });
        });

        // Region filter change
        regionFilter.addEventListener('change', function() {
            if (this.value) {
                const region = regions.find(r => r.nom === this.value);
                if (region) selectRegion(region);
            }
        });

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            if (query.length < 2) return;

            // Search regions
            const region = regions.find(r => r.nom.toLowerCase().includes(query));
            if (region) {
                selectRegion(region);
                return;
            }

            // Search departments
            const dept = departments.find(d => d.nom.toLowerCase().includes(query));
            if (dept) {
                const parentRegion = regions.find(r => r.nom === dept.region);
                if (parentRegion) {
                    selectRegion(parentRegion);
                    setTimeout(() => showDepartment(dept), 100);
                }
            }
        });

        function selectRegion(region) {
            selectedRegion = region;
            selectedDepartment = null;

            // Update map
            document.querySelectorAll('.region-path').forEach(p => p.classList.remove('selected'));
            const path = document.getElementById(`region-${region.nom}`);
            if (path) path.classList.add('selected');

            // Update filter
            regionFilter.value = region.nom;

            displayRegionInfo(region);
        }

        function displayRegionInfo(region) {
            const panel = document.getElementById('infoPanel');
            const regionDepts = departments.filter(d => d.region === region.nom);
            const density = Math.round(region.population / region.superficie);

            panel.innerHTML = `
                <div class="info-header">
                    <h2>${region.nom}</h2>
                    <span class="info-badge">${region.code}</span>
                </div>

                <div class="info-stats">
                    <div class="info-stat-item">
                        <div class="info-stat-label">Population</div>
                        <div class="info-stat-value">${formatNumber(region.population)}</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Superficie</div>
                        <div class="info-stat-value">${formatNumber(region.superficie)} km²</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Densité</div>
                        <div class="info-stat-value">${density} hab/km²</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Départements</div>
                        <div class="info-stat-value">${regionDepts.length}</div>
                    </div>
                </div>

                <div class="department-list">
                    <h3>Départements (${regionDepts.length})</h3>
                    ${regionDepts.map(dept => `
                        <div class="department-item" onclick="showDepartment(departments.find(d => d.nom === '${dept.nom}'))">
                            <div class="department-name">${dept.nom}</div>
                            <div class="department-info">
                                <span>👥 ${formatNumber(dept.population)}</span>
                                <span>📏 ${formatNumber(dept.superficie)} km²</span>
                                <span>🏘️ ${dept.arrondissements.length} arr.</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showDepartment(dept) {
            selectedDepartment = dept;
            const panel = document.getElementById('infoPanel');
            const density = Math.round(dept.population / dept.superficie);

            panel.innerHTML = `
                <button class="back-button" onclick="selectRegion(regions.find(r => r.nom === '${dept.region}'))">
                    ← Retour à ${dept.region}
                </button>

                <div class="info-header">
                    <h2>${dept.nom}</h2>
                    <span class="info-badge">Département de ${dept.region}</span>
                </div>

                <div class="info-stats">
                    <div class="info-stat-item">
                        <div class="info-stat-label">Population</div>
                        <div class="info-stat-value">${formatNumber(dept.population)}</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Superficie</div>
                        <div class="info-stat-value">${formatNumber(dept.superficie)} km²</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Densité</div>
                        <div class="info-stat-value">${density} hab/km²</div>
                    </div>
                    <div class="info-stat-item">
                        <div class="info-stat-label">Arrondissements</div>
                        <div class="info-stat-value">${dept.arrondissements.length}</div>
                    </div>
                </div>

                <div class="department-list">
                    <h3>Arrondissements (${dept.arrondissements.length})</h3>
                    <div class="arrondissement-list">
                        ${dept.arrondissements.map(arr => `
                            <div class="arrondissement-item">${arr}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    </script>
